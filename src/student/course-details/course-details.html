<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Kursdetaljer</title>

    <link rel="stylesheet" href="../../assets/colors.css" />
    <link rel="stylesheet" href="../style/global.css" />
    <link rel="stylesheet" href="../style/header.css" />
    <link rel="stylesheet" href="course-details.css" />

    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
    />

    <script src="course-details.js" defer></script>
    <script type="module">
      import { renderHeader } from '../components/header.js';

      renderHeader();
    </script>
  </head>

  <body>
    <div id="header"></div>
    <main class="details-page">
      <div id="course-container"></div>
    </main>

    <div id="bookingModal" class="modal-overlay">
      <div class="modal-card">
        <h2>Slutför din bokning</h2>
        <p>Vänligen fyll i dina uppgifter för att slutföra bokningen.</p>

        <form id="bookingForm">
          <div class="form-group">
            <label for="modalPhone">Telefonnummer</label>
            <input
              type="tel"
              id="modalPhone"
              placeholder="t.ex. 070-123 45 67"
              required
            />
          </div>

          <div class="form-group">
            <label for="modalAddress">Faktureringsadress</label>
            <textarea
              id="modalAddress"
              rows="3"
              placeholder="Gatuadress, Postnummer, Ort"
              required
            ></textarea>
          </div>

          <div class="modal-actions">
            <button type="button" id="closeModal" class="btn-cancel">
              Avbryt
            </button>
            <button type="submit" class="btn-confirm">Bekräfta bokning</button>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
