<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Logga in</title>

    <link rel="stylesheet" href="../style/global.css" />
    <link rel="stylesheet" href="auth.css" />

    <script type="module" src="/dist/student/auth/login.js" defer></script>
  </head>

  <body>
    <div class="auth-container">
      <h1>Logga in</h1>

      <form>
        <input type="email" placeholder="E-post" name="email" required />

        <input
          type="password"
          placeholder="Lösenord"
          name="password"
          required
        />

        <p class="error-message" id="errorMsg"></p>

        <button type="submit">Logga in</button>
      </form>

      <p class="auth-link">
        Har du inget konto?
        <a href="register.html">Registrera</a>
      </p>
    </div>
  </body>
</html>
